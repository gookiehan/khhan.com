qeaAbstract: A quantum computer exploits the inherent parallelism that is provided
  by the superposition of quantum states. All states can be represented using probabilistic
  methods in parallel processing, and the act of observing the quantum computer produces
  a single state. A novel evolutionary computing algorithm called the Quantum-inspired
  Evolutionary Algorithm (QEA) was proposed and pursued. QEA is characterized by principles
  of quantum computing including concepts of qubits and superposition of states. QEA
  uses a Q-bit representation instead of binary, numeric or symbolic representations.
  QEA can imitate parallel computation in classical computers.
